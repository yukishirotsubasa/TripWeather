name: Deploy Cloud Functions

on:
  push:
    branches: ["main"]
    paths:
      - 'functions/**' # Only deploy if functions code changes
      - '.github/workflows/deploy-functions.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: 'read'
  id-token: 'write'  # 這行最重要，用來換取 GCP 的 Token

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Force Deploy Gen2
        run: |
          gcloud functions deploy weatherProxy \
            --gen2 \
            --runtime=nodejs20 \
            --region=us-central1 \
            --source=./functions \
            --entry-point=weatherProxy \
            --trigger-http \
            --allow-unauthenticated \
            --service-account=${{ secrets.FUNCTION_BUILD_SERVICE_ACCOUNT }} \
            --max-instances=1 \
            --timeout=300 \
            --set-env-vars=DEPLOYED_VIA=github-actions
